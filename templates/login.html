{% extends "base.html" %}
{% block title %}Login - FitTrack{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">&#9878; FitTrack</h1>
        <p class="auth-subtitle">Workout-Tracking, einfach gemacht.</p>
        <form method="POST">
            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" required autofocus placeholder="name@beispiel.de">
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required placeholder="Min. 6 Zeichen">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block btn-lg">Einloggen</button>
            </div>
        </form>
        <p class="text-center mt-2 text-sm">
            Noch kein Konto? <a href="{{ url_for('auth.register') }}">Registrieren</a>
        </p>
    </div>
</div>
{% endblock %}
