<div class="exercise-block" data-exercise-id="{{ ex.id }}">
    <div class="exercise-block-header">
        <div>
            <span class="exercise-block-title">{{ ex.name }}</span>
            <span class="badge badge-muscle">{{ ex.muscle_group }}</span>
        </div>
    </div>
    <table class="set-table">
        <thead>
            <tr>
                <th>Set</th>
                <th>Vorher</th>
                <th>kg</th>
                <th>Reps</th>
                <th>RPE</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="sets-{{ ex.id }}">
            {% for s in ex.sets %}
            {% include "partials/set_row.html" %}
            {% endfor %}
        </tbody>
    </table>
    <div class="exercise-block-footer">
        <form hx-post="{{ url_for('workout.add_set', workout_id=workout.id) }}"
              hx-target="#sets-{{ ex.id }}"
              hx-swap="beforeend">
            <input type="hidden" name="exercise_id" value="{{ ex.id }}">
            <button type="submit" class="btn btn-ghost btn-sm">+ Set</button>
        </form>
    </div>
</div>
